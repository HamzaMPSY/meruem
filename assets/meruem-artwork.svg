<svg width="1600" height="900" viewBox="0 0 1600 900" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">Meruem workflow artwork</title>
  <desc id="desc">A technical editorial illustration showing Meruem as a disciplined AI coding workflow made of tickets, decision gates, graph knowledge, design craft, and verification loops.</desc>
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="1600" y2="900" gradientUnits="userSpaceOnUse">
      <stop stop-color="#07110F"/>
      <stop offset="0.48" stop-color="#0B1716"/>
      <stop offset="1" stop-color="#101314"/>
    </linearGradient>
    <linearGradient id="panel" x1="365" y1="148" x2="1235" y2="748" gradientUnits="userSpaceOnUse">
      <stop stop-color="#12211F" stop-opacity="0.96"/>
      <stop offset="1" stop-color="#10181A" stop-opacity="0.92"/>
    </linearGradient>
    <linearGradient id="cyan" x1="414" y1="206" x2="1184" y2="696" gradientUnits="userSpaceOnUse">
      <stop stop-color="#B8FFF1"/>
      <stop offset="0.48" stop-color="#46E6D0"/>
      <stop offset="1" stop-color="#13A89E"/>
