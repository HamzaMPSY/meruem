    </filter>
    <filter id="nodeGlow" x="-20" y="-20" width="80" height="80" filterUnits="userSpaceOnUse" color-interpolation-filters="sRGB">
      <feGaussianBlur stdDeviation="6"/>
    </filter>
    <pattern id="grid" width="48" height="48" patternUnits="userSpaceOnUse">
      <path d="M 48 0 L 0 0 0 48" stroke="#D7FFF5" stroke-opacity="0.045" stroke-width="1"/>
    </pattern>
  </defs>

